<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Rose 空调遥控器预览</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,0..1,0">
    <style>
        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            padding: 20px;
            background: #eef1f3;
            color: #202124;
            font-family: "Microsoft YaHei", sans-serif
        }

        .material-symbols-rounded {
            font-size: 28px;
            line-height: 1
        }

        .card {
            position: relative;
            width: min(656px, 100%);
            margin: auto;
            padding: 20px 18px 18px;
            border: 1px solid #ddd;
            border-radius: 20px;
            background: #fff
        }

        .header {
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            font-size: 22px;
            font-weight: 500
        }

        .more {
            position: absolute;
            right: -4px;
            top: -8px;
            width: 44px;
            height: 44px;
            border: 0;
            background: transparent;
            color: #666;
            cursor: pointer
        }

        .dial-wrap {
            height: 390px;
            display: grid;
            place-items: center;
            position: relative
        }

        .dial {
            width: min(370px, 78vw);
            height: min(370px, 78vw);
            border-radius: 50%;
            background: conic-gradient(from 225deg, #2196f3 0deg 198deg, #e8e8e8 198deg 270deg, transparent 270deg);
            position: relative;
            display: grid;
            place-items: center
        }

        .dial:after {
            content: "";
            position: absolute;
            inset: 28px;
            border-radius: 50%;
            background: #fff
        }

        .marker {
            position: absolute;
            z-index: 3;
            transform: translate(-50%, -50%);
            width: 18px;
            height: 18px;
            border: 3px solid #fff;
            border-radius: 50%;
            background: #2196f3;
            box-shadow: 0 0 0 2px #2196f3
        }

        .marker.current {
            width: 15px;
            height: 15px;
            background: #fff
        }

        .marker label {
            position: absolute;
            left: 50%;
            bottom: 22px;
            transform: translateX(-50%);
            padding: 2px 6px;
            border-radius: 8px;
            background: #fff;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            box-shadow: 0 1px 4px #0003
        }

        .marker.current label {
            top: 20px;
            bottom: auto
        }

        .center {
            position: relative;
            z-index: 1;
            text-align: center
        }

        .set {
            font-size: 52px;
            line-height: 1.1
        }

        .current {
            margin-top: 24px;
            font-size: 24px;
            font-weight: 600
        }

        .under {
            margin: -34px 12px 20px;
            position: relative;
            z-index: 2
        }

        .swings {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 34px;
            color: #777;
            text-align: center
        }

        .swings span {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            font-size: 15px
        }

        .adjust {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 34px;
            align-items: center;
            margin-top: 14px
        }

        .adjust button {
            justify-self: center;
            width: 72px;
            height: 58px;
            border: 0;
            background: transparent;
            display: grid;
            place-items: center
        }

        .adjust .material-symbols-rounded {
            font-size: 44px
        }

        .modes {
            height: 64px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            border-radius: 18px;
            overflow: hidden;
            background: #f2f2f2
        }

        .mode {
            border: 0;
            background: transparent;
            font-size: 28px
        }

        .mode.active {
            color: #fff;
            background: #03a9f4;
            border-radius: 18px
        }

        .row {
            width: 100%;
            height: 64px;
            margin-top: 18px;
            padding: 0 18px;
            border: 0;
            border-radius: 18px;
            background: #f2f2f2;
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 20px
        }

        .row span:nth-child(2) {
            flex: 1;
            text-align: left
        }

        .row select {
            flex: 1;
            height: 100%;
            border: 0;
            outline: 0;
            background: transparent;
            font: inherit
        }

        .menu {
            position: absolute;
            z-index: 10;
            top: 58px;
            right: 12px;
            width: min(310px, calc(100% - 24px));
            padding: 8px;
            border-radius: 12px;
            background: #fff;
            box-shadow: 0 6px 24px #0004
        }

        .item {
            height: 50px;
            border: 0;
            border-radius: 8px;
            padding: 0 10px;
            background: transparent;
            display: grid;
            grid-template-columns: 32px 1fr 38px;
            align-items: center;
            gap: 8px;
            text-align: left;
            font-size: 16px
        }

        .toggle {
            width: 34px;
            height: 20px;
            border-radius: 10px;
            background: #bbb;
            position: relative
        }

        .toggle:after {
            content: "";
            position: absolute;
            width: 16px;
            height: 16px;
            left: 2px;
            top: 2px;
            border-radius: 50%;
            background: #fff
        }

        .item.on .toggle {
            background: #03a9f4
        }

        .item.on .toggle:after {
            left: 16px
        }

        .item.disabled {
            opacity: .4
        }

        @media(max-width:600px) {
            body {
                padding: 0
            }

            .card {
                border-radius: 0;
                padding: 16px 12px
            }

            .dial-wrap {
                height: 350px
            }

            .dial {
                width: min(330px, 88vw);
                height: min(330px, 88vw)
            }

            .set {
                font-size: 46px
            }

            .under {
                margin: -34px 2px 16px
            }

            .swings {
                gap: 18px
            }

            .adjust {
                gap: 18px
            }
        }
    </style>
    <style>
        .current {
            display: grid;
            justify-items: center;
            gap: 7px;
            white-space: nowrap
        }

        .current>span {
            display: flex;
            align-items: center;
            gap: 5px
        }

        .current .material-symbols-rounded {
            font-size: 22px
        }
    </style>
    <style>
        .card {
            container-type: inline-size;
            width: min(656px, 100%);
            padding: clamp(12px, 3.2cqw, 20px) clamp(10px, 3cqw, 18px) clamp(12px, 3cqw, 18px)
        }

        .header {
            min-height: 34px;
            height: auto;
            padding-inline: 44px;
            font-size: clamp(17px, 4cqw, 22px);
            overflow-wrap: anywhere;
            text-align: center
        }

        .dial-wrap {
            width: 100%;
            height: auto;
            padding-block: clamp(12px, 4cqw, 24px)
        }

        .dial {
            width: min(100%, 420px);
            height: auto;
            aspect-ratio: 1
        }

        .dial:after {
            inset: clamp(18px, 7%, 30px)
        }

        .marker {
            width: clamp(14px, 4.2cqw, 18px);
            height: clamp(14px, 4.2cqw, 18px)
        }

        .marker.current {
            width: clamp(12px, 3.5cqw, 15px);
            height: clamp(12px, 3.5cqw, 15px)
        }

        .marker label {
            font-size: clamp(10px, 2.8cqw, 12px)
        }

        .set {
            font-size: clamp(38px, 11cqw, 58px)
        }

        .current {
            margin-top: clamp(10px, 3.5cqw, 18px);
            gap: clamp(4px, 1.5cqw, 7px);
            font-size: clamp(15px, 4cqw, 21px)
        }

        .under {
            width: min(100%, 420px);
            margin: clamp(-42px, -7cqw, -24px) auto clamp(12px, 3.5cqw, 20px)
        }

        .swings,
        .adjust {
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            gap: clamp(10px, 5cqw, 34px)
        }

        .swings span {
            gap: clamp(3px, 1.5cqw, 7px);
            font-size: clamp(12px, 3.2cqw, 15px);
            white-space: nowrap
        }

        .adjust {
            margin-top: clamp(8px, 2.8cqw, 14px)
        }

        .adjust button {
            width: clamp(52px, 16cqw, 72px);
            height: clamp(48px, 13cqw, 58px)
        }

        .adjust .material-symbols-rounded {
            font-size: clamp(34px, 10cqw, 44px)
        }

        .modes {
            height: clamp(52px, 14cqw, 64px);
            grid-template-columns: repeat(5, minmax(0, 1fr));
            border-radius: clamp(12px, 4cqw, 18px)
        }

        .mode .material-symbols-rounded {
            font-size: clamp(23px, 6cqw, 28px)
        }

        .row {
            height: clamp(52px, 14cqw, 64px);
            margin-top: clamp(10px, 3cqw, 18px);
            padding-inline: clamp(12px, 3.5cqw, 18px);
            border-radius: clamp(12px, 4cqw, 18px);
            gap: clamp(8px, 3cqw, 14px);
            font-size: clamp(16px, 4cqw, 20px)
        }

        .menu {
            top: clamp(50px, 12cqw, 58px);
            right: clamp(6px, 2cqw, 12px);
            width: min(310px, calc(100% - 12px));
            max-height: min(420px, calc(100vh - 100px));
            overflow-y: auto
        }

        @container(max-width:320px) {
            .card {
                padding-inline: 8px
            }

            .header {
                padding-inline: 38px
            }

            .marker label {
                display: none
            }

            .swings span {
                white-space: normal;
                line-height: 1.15
            }

            .item {
                grid-template-columns: 28px minmax(0, 1fr) 34px;
                padding-inline: 6px;
                font-size: 14px
            }
        }
    </style>
</head>

<body>
    <main class="card">
        <header class="header">空调<button class="more" title="扩展控制"><span
                    class="material-symbols-rounded">more_vert</span></button></header>
        <section class="dial-wrap">
            <div class="dial">
                <div class="marker" style="left:87%;top:28%"><label>设定 27°</label></div>
                <div class="marker current" style="left:78%;top:14%"><label>当前 25°</label></div>
                <div class="center">
                    <div class="set">27°</div>
                    <div class="current"><span><span class="material-symbols-rounded">home_thermometer</span>25
                            °C</span><span><span class="material-symbols-rounded">humidity_percentage</span>58%</span>
                    </div>
                </div>
            </div>
        </section>
        <section class="under">
            <div class="swings"><span><span class="material-symbols-rounded">swap_vert</span>上下风向</span><span><span
                        class="material-symbols-rounded">swap_horiz</span>左右固定</span></div>
            <div class="adjust"><button><span class="material-symbols-rounded">remove</span></button><button><span
                        class="material-symbols-rounded">add</span></button></div>
        </section>
        <section class="modes"><button class="mode"><span
                    class="material-symbols-rounded">power_settings_new</span></button><button class="mode active"><span
                    class="material-symbols-rounded">ac_unit</span></button><button class="mode"><span
                    class="material-symbols-rounded">water_drop</span></button><button class="mode"><span
                    class="material-symbols-rounded">air</span></button><button class="mode"><span
                    class="material-symbols-rounded">mode_heat</span></button></section>
        <label class="row"><span class="material-symbols-rounded">mode_fan</span><select aria-label="风速">
                <option>自动</option>
                <option>静音</option>
                <option>低</option>
                <option>中</option>
                <option>高</option>
            </select></label>
        <label class="row"><span class="material-symbols-rounded">timer</span><select aria-label="定时">
                <option>关闭</option>
                <option>30 分钟</option>
                <option>60 分钟</option>
                <option>120 分钟</option>
            </select></label>
        <aside class="menu">
            <button class="item on"><span class="material-symbols-rounded">swap_vert</span><span>上下风向</span><span
                    class="toggle"></span></button>
            <button class="item"><span class="material-symbols-rounded">swap_horiz</span><span>左右风向</span><span
                    class="toggle"></span></button>
            <button class="item"><span class="material-symbols-rounded">air</span><span>强力模式</span><span
                    class="toggle"></span></button>
            <button class="item disabled"><span class="material-symbols-rounded">bedtime</span><span>睡眠模式</span><span
                    class="toggle"></span></button>
            <button class="item on"><span class="material-symbols-rounded">lightbulb</span><span>灯光开关</span><span
                    class="toggle"></span></button>
            <button class="item disabled"><span class="material-symbols-rounded">heat</span><span>辅热开关</span><span
                    class="toggle"></span></button>
            <button class="item"><span class="material-symbols-rounded">eco</span><span>经济省电</span><span
                    class="toggle"></span></button>
        </aside>
    </main>
</body>

</html>
