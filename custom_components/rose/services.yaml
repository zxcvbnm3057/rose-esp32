send_tcl:
  name: Send full TCL state
  description: Sends a TCL air-conditioner state including Rose-specific extended controls.
  fields:
    climate:
      name: Climate key
      required: true
      selector:
        text:
    econo:
      name: Economy mode
      selector:
        boolean:
    health:
      name: Health mode
      selector:
        boolean:
    turbo:
      name: Turbo mode
      selector:
        boolean:
    light:
      name: Panel light
      selector:
        boolean:
    timer_minutes:
      name: Off timer
      selector:
        number:
          min: 0
          max: 1440
          step: 10
          unit_of_measurement: min
    aux_heat:
      name: Auxiliary heat
      selector:
        boolean:
